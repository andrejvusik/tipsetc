<h2 class="title">{% block content_title %}TipsEtc... {{ title.title }}{% endblock %}</h2>
<div class="media">
  <div class="media-content">
    <div class="content">
      <div class="box">
        <a class="button is-dark is-rounded is-fullwidth" href="{{ url_for('admin.createtag') }}">{{ _('Create new tag') }}</a>
      </div>
      {% for tag in tags %}
      <div class="box">
        <div class="columns">
          <div class="column">

            <a class="button is-dark is-rounded is-small is-outlined" href="{{ url_for('post.tagposts', slug = tag.slug) }}"><b>{{ _('Tag: %(name)s.', name = tag.name) }}</b></a>
          </div>
          <div class="column is-narrow">
            <a class="button is-dark is-rounded is-small" href="{{ url_for('post.tagposts', slug = tag.slug) }}">{{ _('Number of posts: %(countposts)s.', countposts = tag.posts.count()) }}</a>
            <a class="button is-dark is-rounded is-small" href="{{ url_for('admin.edittag', slug=tag.slug) }}">{{ _('Edit') }}</a>
            <a class="button is-dark is-rounded is-small" href="{{ url_for('admin.deletetag', slug=tag.slug) }}">{{ _('Delete') }}</a>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
